<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <style>
        .a {
            display: flex;
            gap: 20px;
        }
        .b {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .donation-label {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .donation-label label {
            margin-right: 10px;
        }
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }
        .other-amount {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .other-amount input {
            width: 80px;
        }
        .recurring {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .recurring label {
            margin-right: 10px;
        }
        .monthly-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .monthly-row input {
            width: 70px;
        }

    
    </style>
</head>
<body>
    <h2>* - Denotes Required Information</h2>
    <div class="a">
        <h3>&gt;1 Donation</h3>
        <h3>&gt;2 Confirmation</h3>
        <h3>&gt; Thank you!</h3>
    </div>

    <h2>Donor Information</h2>
    <form action="post">

        <div class="b">
            <label for="Fname">First Name*:</label>
            <input type="text" id="Fname" value="Minhaz">
        </div>

        <div class="b">
            <label for="Lname">Last Name*:</label>
            <input type="text" id="Lname" value="">
        </div>

        <div class="b">
            <label for="Company">Company:</label>
            <input type="text" id="Company" value="">
        </div>

        <div class="b">
            <label for="Address1">Address 1*:</label>
            <input type="text" id="Address1" value="">
        </div>

        <div class="b">
            <label for="Address2">Address 2:</label>
            <input type="text" id="Address2" value="">
        </div>

        <div class="b">
            <label for="City">City*:</label>
            <input type="text" id="City" value="Dhaka">
        </div>

        <div class="b">
            <label for="State">State*:</label>
            <select name="state" id="State">
                <option value="Dhaka" selected>Dhaka</option>
                <option value="Sherpur">Sherpur</option>
            </select>
        </div>

        <div class="b">
            <label for="ZipCode">Zip Code*:</label>
            <input type="text" id="ZipCode" value="1229">
        </div>

        <div class="b">
            <label for="Country">Country*:</label>
            <select name="country" id="Country">
                <option value="Bangladesh" selected>Bangladesh</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="b">
            <label for="Phone">Phone:</label>
            <input type="text" id="Phone" value="">
        </div>

        <div class="b">
            <label for="Fax">Fax:</label>
            <input type="text" id="Fax" value="">
        </div>

        <div class="b">
            <label for="Email">Email*:</label>
            <input type="text" id="Email" value="">
        </div>

        
        <div class="donation-label">
            <label>Donation Amount*<br><small>(Check a button or type in your amount)</small></label>
            <div>
                <div class="radio-group">
                    <input type="radio" name="donation" id="none" value="none" checked>
                    <label for="none">None</label>

                    <input type="radio" name="donation" id="d50" value="50">
                    <label for="50">$50</label>

                    <input type="radio" name="donation" id="d75" value="75">
                    <label for="d75">$75</label>

                    <input type="radio" name="donation" id="d100" value="100">
                    <label for="d100">$100</label>

                    <input type="radio" name="donation" id="d250" value="250">
                    <label for="d250">$250</label>

                    <input type="radio" name="donation" id="dother" value="other">
                    <label for="dother">Other</label>
                </div>

                <div class="other-amount">
                    <label for="otherAmount">Other Amount $</label>
                    <input type="text" id="otherAmount" name="otherAmount">
                </div>
            </div>
        </div>

        
        <div class="recurring">
            <label>Recurring Donation<br><small>(Check if yes)</small></label>
            <div>
                <div class="b">
                    <input type="checkbox" id="recurringCheck" name="recurringCheck">
                    <label for="recurringCheck">I am interested in giving on a regular basis.</label>
                </div>
                <div class="monthly-row">
                    <label for="monthlyAmount">Monthly Credit Card $</label>
                    <input type="text" id="monthlyAmount" name="monthlyAmount">
                    <label for="months">For</label>
                    <input type="text" id="months" name="months">
                    <span>Months</span>
                </div>
            </div>
        </div>

    </form>
</body>
</html>
